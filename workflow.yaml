version: "1"

nodes:
  - id: wagmi-v1-to-v2
    name: "Migrate wagmi v1 → v2"
    type: automatic
    steps:
      - name: "Apply all wagmi v1→v2 transformations"
        js-ast-grep:
          js_file: "scripts/wagmi_v1_to_v2.ts"
          language: "tsx"
          include:
            - "**/*.ts"
            - "**/*.tsx"
          exclude:
            - "**/node_modules/**"
            - "**/dist/**"
            - "**/build/**"
            - "**/*.test.*"
            - "**/*.spec.*"
